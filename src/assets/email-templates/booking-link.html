<!-- Reusable fragment: "Complete your booking" block. Include in approval or other emails. -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0">
  <tr>
    <td style="padding: 8px 0 16px 0;">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
        <tr>
          <td align="center">
            <a href="{bookingLink}" style="display: inline-block; background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #111827; font-weight: 600; font-size: 16px; text-decoration: none; padding: 16px 32px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">Complete your booking</a>
          </td>
        </tr>
        <tr>
          <td align="center" style="padding-top: 12px;">
            <p style="margin: 0; font-size: 13px; color: #6b7280;">This link is valid for 48 hours and can only be used once.</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
