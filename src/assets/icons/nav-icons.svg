<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- Home Icon -->
  <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
    <polyline points="9 22 9 12 15 12 15 22"></polyline>
  </symbol>

  <!-- Services Icon - Chauffeur Cap (Improved Design) -->
  <symbol id="icon-services" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cap crown (rounded top) -->
    <path d="M12 5.5c-2.8 0-5 1.3-5 3v1.5c0 1.2 1.3 1.8 2.5 1.8h5c1.2 0 2.5-0.6 2.5-1.8V8.5c0-1.7-2.2-3-5-3z"></path>
    <!-- Cap visor (flat brim) -->
    <ellipse cx="12" cy="11" rx="7.5" ry="1.3"></ellipse>
    <!-- Visor curve detail -->
    <path d="M4.5 11.2 Q12 11.8 19.5 11.2"></path>
  </symbol>

  <!-- About Icon - Building -->
  <symbol id="icon-about" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 21h18"></path>
    <path d="M5 21V7l8-4v18"></path>
    <path d="M19 21V11l-6-4"></path>
    <line x1="9" y1="9" x2="9" y2="9.01"></line>
    <line x1="9" y1="12" x2="9" y2="12.01"></line>
    <line x1="9" y1="15" x2="9" y2="15.01"></line>
    <line x1="9" y1="18" x2="9" y2="18.01"></line>
  </symbol>

  <!-- Fleet Icon - Vehicle/Car -->
  <symbol id="icon-fleet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="7" cy="17" r="2.5"></circle>
    <circle cx="17" cy="17" r="2.5"></circle>
    <path d="M17 17H7l-1-5h12l-1 5z"></path>
    <path d="M7 17V9a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v8"></path>
    <path d="M7 9h10"></path>
  </symbol>

  <!-- Contact Icon - Envelope -->
  <symbol id="icon-contact" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
    <polyline points="3,7 12,13 21,7"></polyline>
  </symbol>

  <!-- Partnerships Icon - Handshake -->
  <symbol id="icon-partnerships" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 12h2a2 2 0 1 0 0-4h-3c-.6 0-1.1.2-1.4.6L3 14"></path>
    <path d="M7 18h1a2 2 0 0 0 0-4H5c-.6 0-1.1.2-1.4.6L3 20"></path>
    <path d="M13 12h2a2 2 0 1 1 0-4h-3c-.6 0-1.1.2-1.4.6l-3.6 5.4"></path>
    <path d="M17 18h1a2 2 0 0 1 0-4h-3c-.6 0-1.1.2-1.4.6l-3.6 5.4"></path>
  </symbol>
</svg>
